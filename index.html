<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KSMS 블록 세상 (Multiplayer)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Noto Sans KR -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Three.js (r128) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-sky-200 overflow-hidden w-full h-full">

    <!-- 로그인 (닉네임 입력) 오버레이 팝업 -->
    <div id="login-overlay" class="absolute inset-0 bg-slate-900/90 backdrop-blur-md z-50 flex items-center justify-center p-4">
        <div class="bg-slate-950 p-6 md:p-8 rounded-2xl border border-white/10 max-w-sm w-full text-center shadow-2xl flex flex-col items-center">
            <div class="flex items-center justify-center gap-3 mb-6">
                <!-- 팝업용 스티브 얼굴 아이콘 -->
                <svg class="w-10 h-10 rounded-lg shadow-sm" viewBox="0 0 8 8" shape-rendering="crispEdges">
                    <rect width="8" height="8" fill="#FFD1B3"/>
                    <rect width="8" height="2" fill="#6A4F3B"/>
                    <rect x="0" y="2" width="1" height="2" fill="#6A4F3B"/>
                    <rect x="7" y="2" width="1" height="2" fill="#6A4F3B"/>
                    <rect x="1" y="4" width="2" height="1" fill="#FFFFFF"/>
                    <rect x="1" y="4" width="1" height="1" fill="#3388FF"/>
                    <rect x="5" y="4" width="2" height="1" fill="#FFFFFF"/>
                    <rect x="6" y="4" width="1" height="1" fill="#3388FF"/>
                    <rect x="0" y="5" width="1" height="1" fill="#FF9E9E"/>
                    <rect x="7" y="5" width="1" height="1" fill="#FF9E9E"/>
                    <rect x="2" y="6" width="4" height="1" fill="#9C2A2A"/>
                    <rect x="3" y="6" width="2" height="1" fill="#FF7D7D"/>
                </svg>
                <h2 class="text-2xl font-black text-white font-['Noto_Sans_KR'] drop-shadow-[0_2px_8px_rgba(0,0,0,0.5)] mt-1">KSMS 블록 세상</h2>
            </div>
            <input type="text" id="input-username" placeholder="이름을 입력하세요" class="w-full h-12 px-4 rounded-xl bg-slate-800 text-white border border-white/10 focus:outline-none focus:border-yellow-400 text-center text-lg font-bold mb-4">
            <button id="btn-login-submit" class="w-full h-12 bg-yellow-400 hover:bg-yellow-300 active:scale-95 text-red-600 font-black text-lg rounded-xl shadow-lg transition-all flex items-center justify-center">
                <span id="login-text">서버 접속하기</span>
            </button>
        </div>
    </div>

    <!-- WebGL Canvas 컨테이너 -->
    <div id="canvas-container" class="absolute inset-0 w-full h-full z-0"></div>

    <!-- 숨겨진 맵 파일 업로드 Input -->
    <input type="file" id="file-map-upload" accept=".ksms" class="hidden">

    <!-- 메인 UI 레이어 -->
    <div class="absolute inset-0 pointer-events-none z-10 flex flex-col justify-between p-4 md:p-6" style="display: none;" id="main-ui-layer">
        
        <!-- 상단 바 -->
        <div class="flex justify-between items-center w-full pointer-events-auto gap-4">
            <div class="flex items-center gap-2 md:gap-3">
                <div class="bg-slate-950/75 backdrop-blur-xl h-[72px] px-5 rounded-2xl border border-white/10 flex items-center gap-3.5 shadow-2xl">
                    <!-- 스티브 얼굴 아이콘 -->
                    <svg class="w-8 h-8 rounded-lg shadow-sm" viewBox="0 0 8 8" shape-rendering="crispEdges">
                        <rect width="8" height="8" fill="#FFD1B3"/>
                        <rect width="8" height="2" fill="#6A4F3B"/>
                        <rect x="0" y="2" width="1" height="2" fill="#6A4F3B"/>
                        <rect x="7" y="2" width="1" height="2" fill="#6A4F3B"/>
                        <rect x="1" y="4" width="2" height="1" fill="#FFFFFF"/>
                        <rect x="1" y="4" width="1" height="1" fill="#3388FF"/>
                        <rect x="5" y="4" width="2" height="1" fill="#FFFFFF"/>
                        <rect x="6" h="4" width="1" height="1" fill="#3388FF"/>
                        <rect x="0" y="5" width="1" height="1" fill="#FF9E9E"/>
                        <rect x="7" y="5" width="1" height="1" fill="#FF9E9E"/>
                        <rect x="2" y="6" width="4" height="1" fill="#9C2A2A"/>
                        <rect x="3" y="6" width="2" height="1" fill="#FF7D7D"/>
                    </svg>
                    <div class="flex flex-col justify-center">
                        <h1 class="text-sm md:text-xl font-black text-white tracking-wide drop-shadow-[0_2px_8px_rgba(0,0,0,0.5)] leading-tight">
                            KSMS 블록 세상
                        </h1>
                    </div>
                </div>
                
                <!-- 방장 전용 타이틀 우측 긴급 조작 패널 (글자 제거 및 세련된 아이콘화 완료) -->
                <div id="admin-title-actions" class="flex gap-2 md:gap-3" style="display: none;">
                    <button id="btn-kick-all" title="모든 유저 퇴장" class="w-[72px] h-[72px] bg-slate-950/75 backdrop-blur-xl hover:bg-slate-900/90 active:scale-95 transition text-white rounded-2xl shadow-2xl border border-white/10 flex items-center justify-center">
                        <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                        </svg>
                    </button>
                    <button id="btn-clear-map" title="전체 맵 삭제" class="w-[72px] h-[72px] bg-slate-950/75 backdrop-blur-xl hover:bg-slate-900/90 active:scale-95 transition text-white rounded-2xl shadow-2xl border border-white/10 flex items-center justify-center">
                        <svg class="w-8 h-8 text-orange-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1-1v3M4 7h16"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 우측 상단 액션 버튼 -->
            <div class="flex gap-2 md:gap-3">
                <!-- 방장 전용: 저장 / 불러오기 -->
                <div id="admin-only-actions" class="flex gap-2 md:gap-3" style="display: none;">
                    <button id="btn-save-file" title="맵 파일 다운로드 (.ksms)" class="w-[72px] h-[72px] bg-slate-950/75 backdrop-blur-xl hover:bg-slate-900/90 active:scale-95 transition text-white rounded-2xl shadow-2xl border border-white/10 flex items-center justify-center">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V8l-4-4H8z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 14v7M9 17l3 3 3-3M7 4h6v4H7z"></path>
                        </svg>
                    </button>
                    <button id="btn-load-file" title="맵 서버에 업로드 (.ksms)" class="w-[72px] h-[72px] bg-slate-950/75 backdrop-blur-xl hover:bg-slate-900/90 active:scale-95 transition text-white rounded-2xl shadow-2xl border border-white/10 flex items-center justify-center">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15V9M9 12l3-3 3 3"></path>
                        </svg>
                    </button>
                </div>
                <!-- 캡처 및 전체화면 -->
                <button id="btn-camera" title="스냅샷 캡처" class="w-[72px] h-[72px] bg-slate-950/75 backdrop-blur-xl hover:bg-slate-900/90 active:scale-95 transition text-white rounded-2xl shadow-2xl border border-white/10 flex items-center justify-center">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 018.686 5h6.628c.783 0 1.5.437 1.859 1.175l.443.91a1.154 1.154 0 00.93.595h1.104C20.65 7.68 22 9.03 22 10.699v7.3a2.95 2.95 0 01-2.95 2.95H4.95A2.95 2.95 0 012 18V10.7c0-1.67 1.35-3.02 3.018-3.02h1.104a1.154 1.154 0 00.93-.595l.443-.91z"></path>
                        <circle cx="12" cy="14" r="3.5" stroke-linecap="round" stroke-linejoin="round"></circle>
                    </svg>
                </button>
                <button id="btn-fullscreen" title="전체화면" class="w-[72px] h-[72px] bg-slate-950/75 backdrop-blur-xl hover:bg-slate-900/90 active:scale-95 transition text-white rounded-2xl shadow-2xl border border-white/10 flex items-center justify-center font-bold text-3xl">
                    ⛶
                </button>
            </div>
        </div>

        <!-- 수직 비행 버튼 -->
        <div class="absolute right-4 top-1/2 -translate-y-1/2 flex flex-col items-center gap-4 pointer-events-auto z-10">
            <button id="btn-fly-up" class="w-[72px] h-[72px] bg-slate-950/75 backdrop-blur-xl active:bg-slate-800 text-white border border-white/10 rounded-2xl flex items-center justify-center font-black text-2xl shadow-2xl transition-all hover:bg-slate-900/90 active:scale-90">▲</button>
            <button id="btn-fly-down" class="w-[72px] h-[72px] bg-slate-950/75 backdrop-blur-xl active:bg-slate-800 text-white border border-white/10 rounded-2xl flex items-center justify-center font-black text-2xl shadow-2xl transition-all hover:bg-slate-900/90 active:scale-90">▼</button>
        </div>

        <!-- 하단 조작계 -->
        <div class="w-full flex flex-col md:flex-row justify-between items-end gap-6">
            
            <!-- D-Pad -->
            <div class="pointer-events-auto flex flex-col gap-1">
                <div class="grid grid-cols-3 gap-2">
                    <div></div>
                    <button id="dpad-up" class="w-[72px] h-[72px] bg-slate-950/75 backdrop-blur-xl active:bg-slate-800 text-white border border-white/10 rounded-2xl flex items-center justify-center font-black text-2xl shadow-lg transition-all hover:bg-slate-900/90 active:scale-90">▲</button>
                    <div></div>
                    <button id="dpad-left" class="w-[72px] h-[72px] bg-slate-950/75 backdrop-blur-xl active:bg-slate-800 text-white border border-white/10 rounded-2xl flex items-center justify-center font-black text-2xl shadow-lg transition-all hover:bg-slate-900/90 active:scale-90">◀</button>
                    <button id="dpad-down" class="w-[72px] h-[72px] bg-slate-950/75 backdrop-blur-xl active:bg-slate-800 text-white border border-white/10 rounded-2xl flex items-center justify-center font-black text-2xl shadow-lg transition-all hover:bg-slate-900/90 active:scale-90">▼</button>
                    <button id="dpad-right" class="w-[72px] h-[72px] bg-slate-950/75 backdrop-blur-xl active:bg-slate-800 text-white border border-white/10 rounded-2xl flex items-center justify-center font-black text-2xl shadow-lg transition-all hover:bg-slate-900/90 active:scale-90">▶</button>
                </div>
            </div>

            <!-- 팔레트 컨테이너 -->
            <div class="bg-slate-950/75 backdrop-blur-xl h-[72px] px-5 rounded-2xl shadow-2xl border border-white/10 pointer-events-auto flex items-center justify-center mx-auto max-w-[95%] md:max-w-xl">
                <div id="palette-container" class="flex gap-2.5 md:gap-3.5 py-1 px-1 justify-center items-center"></div>
            </div>

            <!-- 블록 조작 (O/X) -->
            <div class="pointer-events-auto flex flex-col gap-1 items-center self-center md:self-end">
                <div class="flex gap-2">
                    <button id="btn-mode-build" class="w-[72px] h-[72px] bg-slate-950/75 text-white border border-white/10 rounded-2xl flex items-center justify-center font-black text-4xl shadow-lg transition-all active:scale-90 pb-1.5 leading-none">O</button>
                    <button id="btn-mode-break" class="w-[72px] h-[72px] bg-slate-950/75 text-white border border-white/10 rounded-2xl flex items-center justify-center font-black text-4xl shadow-lg transition-all active:scale-90 pb-1.5 leading-none">X</button>
                </div>
            </div>
        </div>
    </div>

    <!-- UI 가이드 및 에러 억제용 브라우저 얼럿 대체 시스템 (커스텀 프리미엄 팝업 모달) -->
    <div id="custom-modal" class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4" style="display: none;">
        <div class="bg-slate-950 p-6 md:p-8 rounded-3xl border border-white/10 max-w-sm w-full text-center shadow-2xl flex flex-col items-center">
            <svg class="w-12 h-12 text-yellow-400 mb-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
            <p id="modal-text" class="text-white font-bold text-lg leading-relaxed mb-6"></p>
            <div class="flex gap-3 w-full">
                <button id="modal-btn-cancel" class="flex-1 h-12 bg-slate-850 hover:bg-slate-800 text-white font-bold rounded-xl transition border border-white/5 active:scale-95">취소</button>
                <button id="modal-btn-confirm" class="flex-1 h-12 bg-yellow-400 hover:bg-yellow-300 text-red-600 font-black rounded-xl transition active:scale-95 shadow-lg shadow-yellow-500/10">확인</button>
            </div>
        </div>
    </div>

    <div id="custom-alert" class="absolute top-6 left-1/2 -translate-x-1/2 bg-slate-950/95 border border-white/10 px-6 py-4 rounded-2xl shadow-2xl z-[100] flex items-center gap-3 transition-all duration-300 pointer-events-none" style="display: none; opacity: 0; min-width: 280px; max-width: 90%;">
        <svg class="w-6 h-6 text-yellow-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <span class="text-white font-bold text-sm leading-snug" id="alert-text"></span>
    </div>

    <!-- Firebase 및 Three.js 메인 로직 모듈 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ★ [여기에 파이어베이스 설정값을 복사해서 붙여넣으세요!] ★
const firebaseConfig = {
  apiKey: "AIzaSyCmyRWVTAlpYxVKDNMV6zbKSg_D-jA_bL8",
  authDomain: "ksms-block-world.firebaseapp.com",
  projectId: "ksms-block-world",
  storageBucket: "ksms-block-world.firebasestorage.app",
  messagingSenderId: "47281304421",
  appId: "1:47281304421:web:774a76a83d8b10db37678c"
};
        // =========================================================

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'ksms-blocks';

        // 글로벌 변수
        let myUserId = null;
        let currentUserName = "";
        let isAdminMode = false;
        let hasSyncedOnce = false; // 초기 로그인 로딩 전 강퇴 튕김 오작동 방지 플래그
        
        const BLOCKS_PALETTE = [
            { id: 'white',  name: '하얀색', fill: '#FFFFFF', border: '#D6D6D6' },
            { id: 'gray',   name: '회색',   fill: '#9E9E9E', border: '#5C5C5C' },
            { id: 'black',  name: '검정색', fill: '#2A2A2A', border: '#111111' },
            { id: 'red',    name: '빨간색', fill: '#FF4D4D', border: '#B31E1E' },
            { id: 'orange', name: '주황색', fill: '#FF9433', border: '#BA5D00' },
            { id: 'yellow', name: '노란색', fill: '#FFDE33', border: '#B09300' },
            { id: 'green',  name: '초록색', fill: '#4CD964', border: '#218E33' },
            { id: 'blue',   name: '파란색', fill: '#3388FF', border: '#004DB3' },
            { id: 'purple', name: '보라색', fill: '#AF52DE', border: '#701DA1' },
            { id: 'pink',   name: '분홍색', fill: '#FF6384', border: '#C62E4F' }
        ];

        let selectedColorIndex = 3; 
        let activeMode = 'build'; 

        // 커스텀 UI 얼럿 및 컨펌 기능 바인딩 (alert(), confirm() 완전 대체)
        window.customConfirm = function(msg, onConfirm) {
            const modal = document.getElementById('custom-modal');
            const text = document.getElementById('modal-text');
            const btnCancel = document.getElementById('modal-btn-cancel');
            const btnConfirm = document.getElementById('modal-btn-confirm');
            
            text.innerText = msg;
            btnCancel.style.display = 'block'; 
            modal.style.display = 'flex';
            
            btnConfirm.onclick = () => {
                modal.style.display = 'none';
                if (onConfirm) onConfirm();
            };
            btnCancel.onclick = () => {
                modal.style.display = 'none';
            };
        };

        window.customAlert = function(msg, duration = 3000) {
            const alertBox = document.getElementById('custom-alert');
            const text = document.getElementById('alert-text');
            text.innerText = msg;
            
            alertBox.style.display = 'flex';
            // 리플로우 강제 후 애니메이션 적용
            alertBox.offsetHeight; 
            alertBox.style.opacity = '1';
            
            setTimeout(() => {
                alertBox.style.opacity = '0';
                setTimeout(() => {
                    alertBox.style.display = 'none';
                }, 300);
            }, duration);
        };

        // 사운드 이펙트
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        window.playSound = function(type) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                if (type === 'build') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(450, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1100, audioCtx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
                } else if (type === 'break') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(140, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.18);
                    gain.gain.setValueAtTime(0.35, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.18);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.18);
                }
            } catch(e) {}
        }

        // UI 모드 업데이트
        function updateModeUI() {
            const btnBuild = document.getElementById('btn-mode-build');
            const btnBreak = document.getElementById('btn-mode-break');
            if (activeMode === 'build') {
                btnBuild.className = "w-[72px] h-[72px] bg-yellow-400 text-red-600 border-2 border-yellow-300 rounded-2xl flex items-center justify-center font-black text-4xl shadow-[0_0_15px_rgba(234,179,8,0.6)] transition-all scale-[1.05] pb-1.5 leading-none";
                btnBreak.className = "w-[72px] h-[72px] bg-slate-950/75 text-white/60 border border-white/10 rounded-2xl flex items-center justify-center font-black text-4xl shadow-lg transition-all active:scale-90 hover:text-white pb-1.5 leading-none";
            } else {
                btnBuild.className = "w-[72px] h-[72px] bg-slate-950/75 text-white/60 border border-white/10 rounded-2xl flex items-center justify-center font-black text-4xl shadow-lg transition-all active:scale-90 hover:text-white pb-1.5 leading-none";
                btnBreak.className = "w-[72px] h-[72px] bg-yellow-400 text-red-600 border-2 border-yellow-300 rounded-2xl flex items-center justify-center font-black text-4xl shadow-[0_0_15px_rgba(234,179,8,0.6)] transition-all scale-[1.05] pb-1.5 leading-none";
            }
        }

        document.getElementById('btn-mode-build').onclick = (e) => { e.stopPropagation(); activeMode = 'build'; updateModeUI(); window.playSound('build'); };

        function createNameTag(text) {
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.font = 'bold 54px Noto Sans KR, sans-serif';
            const textWidth = tempCtx.measureText(text).width;
            
            const paddingX = 60;
            const canvasWidth = textWidth + paddingX * 2;
            const canvasHeight = 128;

            const canvas = document.createElement('canvas');
            canvas.width = canvasWidth; 
            canvas.height = canvasHeight;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.beginPath();
            ctx.roundRect(10, 10, canvasWidth - 20, 108, 24);
            ctx.fill();

            ctx.font = 'bold 54px Noto Sans KR, sans-serif';
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvasWidth / 2, 64);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(spriteMat);
            
            const scaleFactor = 0.75 / 128; 
            sprite.scale.set(canvasWidth * scaleFactor, 0.75, 1);
            return sprite;
        }

        // 재사용 가능한 공용 스티브 생성 함수 (나, 그리고 다른 플레이어 그리기)
        function createSteveAvatar(name, isRemoteAdmin) {
            const group = new THREE.Group();
            const skinMat = new THREE.MeshLambertMaterial({ color: '#FFD1B3' });
            const overallsMat = new THREE.MeshLambertMaterial({ color: '#55A0FF' });
            const hairMat = new THREE.MeshLambertMaterial({ color: '#6A4F3B' });
            const shoeMat = new THREE.MeshLambertMaterial({ color: '#444444' });
            const yellowBtnMat = new THREE.MeshLambertMaterial({ color: '#FFB833' });

            const faceCanvas = document.createElement('canvas'); faceCanvas.width = 128; faceCanvas.height = 128;
            const faceCtx = faceCanvas.getContext('2d');
            faceCtx.fillStyle = '#FFD1B3'; faceCtx.fillRect(0, 0, 128, 128);
            faceCtx.fillStyle = '#6A4F3B'; faceCtx.fillRect(0, 0, 128, 32); faceCtx.fillRect(0, 32, 20, 24); faceCtx.fillRect(108, 32, 20, 24);
            faceCtx.fillStyle = '#FFFFFF'; faceCtx.fillRect(20, 52, 24, 24); faceCtx.fillRect(84, 52, 24, 24);
            faceCtx.fillStyle = '#3388FF'; faceCtx.fillRect(28, 56, 16, 16); faceCtx.fillRect(84, 56, 16, 16);
            faceCtx.fillStyle = '#FFFFFF'; faceCtx.fillRect(36, 56, 6, 6); faceCtx.fillRect(92, 56, 6, 6);
            faceCtx.fillStyle = '#FF9E9E'; faceCtx.fillRect(16, 80, 20, 14); faceCtx.fillRect(92, 80, 20, 14);
            faceCtx.fillStyle = '#9C2A2A'; faceCtx.fillRect(44, 88, 40, 14); faceCtx.fillStyle = '#FF7D7D'; faceCtx.fillRect(50, 94, 28, 8);

            const faceTexture = new THREE.CanvasTexture(faceCanvas);
            const headMaterials = [ hairMat, hairMat, hairMat, hairMat, new THREE.MeshLambertMaterial({ map: faceTexture }), hairMat ];

            const headGeo = new THREE.BoxGeometry(0.85, 0.85, 0.85);
            const head = new THREE.Mesh(headGeo, headMaterials); head.position.y = 0.85; head.castShadow = true; group.add(head);

            const bodyGeo = new THREE.BoxGeometry(0.65, 0.75, 0.45);
            const body = new THREE.Mesh(bodyGeo, overallsMat); body.position.y = 0.15; body.castShadow = true; group.add(body);

            const btnGeo = new THREE.BoxGeometry(0.08, 0.08, 0.05);
            const btnLeft = new THREE.Mesh(btnGeo, yellowBtnMat); btnLeft.position.set(-0.2, 0.35, 0.23);
            const btnRight = btnLeft.clone(); btnRight.position.x = 0.2; group.add(btnLeft); group.add(btnRight);

            const armGeo = new THREE.BoxGeometry(0.2, 0.65, 0.2);
            const armMatArray = [ skinMat, skinMat, overallsMat, skinMat, skinMat, skinMat ];
            const lArm = new THREE.Mesh(armGeo, armMatArray); lArm.position.set(-0.45, 0.15, 0); lArm.castShadow = true; lArm.name = "lArm"; group.add(lArm);
            const rArm = new THREE.Mesh(armGeo, armMatArray); rArm.position.set(0.45, 0.15, 0); rArm.castShadow = true; rArm.name = "rArm"; group.add(rArm);

            const legGeo = new THREE.BoxGeometry(0.24, 0.45, 0.24);
            const legMatArray = [ overallsMat, overallsMat, overallsMat, overallsMat, overallsMat, shoeMat ];
            const lLeg = new THREE.Mesh(legGeo, legMatArray); lLeg.position.set(-0.2, -0.4, 0); lLeg.castShadow = true; lLeg.name = "lLeg"; group.add(lLeg);
            const rLeg = new THREE.Mesh(legGeo, legMatArray); rLeg.position.set(0.2, -0.4, 0); rLeg.castShadow = true; rLeg.name = "rLeg"; group.add(rLeg);

            let tag = null;
            if (!isRemoteAdmin) {
                tag = createNameTag(name);
                tag.position.y = 1.9;
                tag.name = "nameTag";
                group.add(tag);

            return { group, lArm, rArm, lLeg, rLeg, tag };
        }

            ghostMesh.visible = false; scene.add(ghostMesh);

        // --- Firebase 실시간 연동 (블록 & 플레이어) ---
        async function startFirebaseMultiplayer() {
            await signInAnonymously(auth);

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    myUserId = user.uid;
                    setupBlocksListener();
                    setupPlayersListener();
                    
                    // 1초(1000ms) 전송 주기로 대폭 개선하여 트래픽 한도 초과 방지
                    setInterval(syncMyPlayerPosition, 1000);

                    // 일반 플레이어 화면에서 내 닉네임 데이터의 강제 삭제 유무를 반응형으로 검사 (강퇴 수신기)
                    onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'players', myUserId), (snapshot) => {
                        if (hasSyncedOnce && !snapshot.exists()) {
                            // alert() 대신 커스텀 모달 알림창 사용
                            const modal = document.getElementById('custom-modal');

                            modal.style.display = 'flex';
                            
                            btnConfirm.onclick = () => {
                                location.reload(); // 로그인 화면으로 이동
                            };
                        }
                    });

                    // 브라우저 닫을 때 접속자 명단에서 자동 삭제
                    window.addEventListener('beforeunload', () => {
                        deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', myUserId));
                    });
                }
            });
        }

        function createBlockMeshLocally(colorObj, paletteIdx) {
            const mainGeo = new THREE.BoxGeometry(0.99, 0.99, 0.99);
            const mainMat = new THREE.MeshLambertMaterial({ color: colorObj.fill, roughness: 0.8 });
            const voxelMesh = new THREE.Mesh(mainGeo, mainMat); voxelMesh.castShadow = true; voxelMesh.receiveShadow = true;
            voxelMesh.userData = { paletteIndex: paletteIdx };
            const edgesGeo = new THREE.EdgesGeometry(mainGeo);
            const line = new THREE.LineSegments(edgesGeo, new THREE.LineBasicMaterial({ color: colorObj.border, linewidth: 2.5 }));
            voxelMesh.add(line);
            return voxelMesh;
        }

        function setBlockLocal(x, y, z, colorObj, paletteIdx) {
            const key = `${x},${y},${z}`;
            if (voxels[key]) { voxelGroup.remove(voxels[key]); delete voxels[key]; }
            const mesh = createBlockMeshLocally(colorObj, paletteIdx); mesh.position.set(x, y, z); voxelGroup.add(mesh); voxels[key] = mesh;
        }

        function removeBlockLocal(x, y, z) {
            const key = `${x},${y},${z}`;
            if (voxels[key]) { voxelGroup.remove(voxels[key]); delete voxels[key]; return true; }
            return false;
        }

        // 서버 리스너 (블록 추가/삭제 실시간 반영)
        function setupBlocksListener() {
            if (!myUserId) return;
            const blocksRef = collection(db, 'artifacts', appId, 'public', 'data', 'blocks');
            onSnapshot(blocksRef, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    const data = change.doc.data();
                    if (change.type === 'added' || change.type === 'modified') {
                        setBlockLocal(data.x, data.y, data.z, BLOCKS_PALETTE[data.colorIndex] || BLOCKS_PALETTE[0], data.colorIndex);
                    }
                    if (change.type === 'removed') {
                        removeBlockLocal(data.x, data.y, data.z);
                    }
                });
            }, (err) => console.error("Blocks Snapshot error:", err));
        }

        async function addBlockToFirebase(x, y, z, colorIndex) {
            setBlockLocal(x, y, z, BLOCKS_PALETTE[colorIndex], colorIndex); 
            window.playSound('build');
            if (!myUserId) return;
            const blockId = `${x}_${y}_${z}`;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'blocks', blockId), { x, y, z, colorIndex });
        }

        async function removeBlockFromFirebase(x, y, z) {
            if (removeBlockLocal(x, y, z)) window.playSound('break'); 
            if (!myUserId) return;
            const blockId = `${x}_${y}_${z}`;
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'blocks', blockId));
        }

        // 서버 리스너 (다른 플레이어들 움직임)
        function setupPlayersListener() {
            if (!myUserId) return;
            const playersRef = collection(db, 'artifacts', appId, 'public', 'data', 'players');
            onSnapshot(playersRef, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    const id = change.doc.id;
                    if (id === myUserId) return; 

                    const data = change.doc.data();

                    // 일반 유저 화면에서는 방장 통신 완전 무시 (은신 효과)
                    if (!isAdminMode && data.isAdmin) {
                        if (remotePlayers[id]) {
                            scene.remove(remotePlayers[id].avatar.group);
                            delete remotePlayers[id];
                        }
                        return;
                    }

                    if (change.type === 'added') {
                        const avatarInfo = createSteveAvatar(data.name, data.isAdmin);
                        scene.add(avatarInfo.group);
                        avatarInfo.group.position.set(data.x, data.y, data.z);
                        remotePlayers[id] = { 
                            avatar: avatarInfo, 
                            targetPos: new THREE.Vector3(data.x, data.y, data.z), 
                            targetRot: data.rotY, 
                            animTime: data.animTime 
                        };
                    }
                    if (change.type === 'modified' && remotePlayers[id]) {
                        remotePlayers[id].targetPos.set(data.x, data.y, data.z);
                        remotePlayers[id].targetRot = data.rotY;
                        remotePlayers[id].animTime = data.animTime;
                    }
                    if (change.type === 'removed' && remotePlayers[id]) {
                        scene.remove(remotePlayers[id].avatar.group);
                        delete remotePlayers[id];
                    }
                });
            });
        }

        function syncMyPlayerPosition() {
            if (!myUserId || !db) return;
            setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', myUserId), {
                x: player.pos.x, y: player.pos.y, z: player.pos.z,
                rotY: player.rotY, animTime: player.animTime,
                name: currentUserName, isAdmin: isAdminMode,
                timestamp: serverTimestamp()
            }, { merge: true }).then(() => {
                hasSyncedOnce = true; // 최초 동기화 연결 세팅 완료 선언 (강퇴 오작동 방지)
            });
        }

        // --- 방장 관리자 전용 긴급 원격 컨트롤러 로직 ---

        // 1. 접속한 모든 유저 원격 퇴장(강제 강퇴) 시키기 (confirm() 대체 완료)

        // 2. 전체 맵 데이터베이스에서 실시간 일괄 초기화(완전 삭제)하기 (confirm() 대체 완료)
        document.getElementById('btn-clear-map').onclick = (e) => {

            window.customConfirm("정말 데이터베이스의 모든 블록 데이터를 초기화하시겠습니까? 이 작업은 되돌릴 수 없습니다.", async () => {

                const keys = Object.keys(voxels);

            });
        };

        // --- 방장 관리자용 저장 및 서버 전체 업로드 ---
        function getSerializedWorldData() {
            const data = [];
            for (let key in voxels) {
                const mesh = voxels[key];
                data.push({ x: mesh.position.x, y: mesh.position.y, z: mesh.position.z, pi: mesh.userData.paletteIndex !== undefined ? mesh.userData.paletteIndex : 0 });
            }
            return data;
        }

        document.getElementById('btn-save-file').onclick = (e) => {
            e.stopPropagation(); window.playSound('build');
            const data = getSerializedWorldData();
            if (data.length === 0) { window.customAlert("저장할 블록이 없습니다!"); return; }
            const jsonString = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonString], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const now = new Date();
            const fmt = `${String(now.getFullYear()).slice(-2)}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`;
            const a = document.createElement('a');
            a.href = url; a.download = `block_${fmt}.ksms`; a.click();
            setTimeout(() => URL.revokeObjectURL(url), 100);
        };

        const fileInput = document.getElementById('file-map-upload');
        document.getElementById('btn-load-file').onclick = (e) => { e.stopPropagation(); window.playSound('build'); fileInput.click(); };
        fileInput.onchange = async (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    const parsed = JSON.parse(event.target.result);
                    if (!Array.isArray(parsed)) throw new Error(".ksms 포맷 에러");
                    
                    document.getElementById('btn-load-file').style.opacity = '0.5';
                    // 1. 기존 서버 블록 완전 초기화 
                    const blocksRef = collection(db, 'artifacts', appId, 'public', 'data', 'blocks');
                    for (let key in voxels) {
                        const p = key.split(',');
                        await deleteDoc(doc(blocksRef, `${p[0]}_${p[1]}_${p[2]}`));
                    }
                    // 2. 파싱된 데이터 서버로 업로드 (리스너를 통해 모든 유저에게 자동 생성됨)
                    for (const b of parsed) {
                        await setDoc(doc(blocksRef, `${b.x}_${b.y}_${b.z}`), { x: b.x, y: b.y, z: b.z, colorIndex: b.pi });
                    }
                    window.customAlert("서버에 새로운 맵 파일이 성공적으로 배포되었습니다!");
                    document.getElementById('btn-load-file').style.opacity = '1';
                } catch (err) { window.customAlert("로드 실패: " + err.message); document.getElementById('btn-load-file').style.opacity = '1';}
                fileInput.value = '';
            };
            reader.readAsText(file);
        };

        // --- 상호작용 (마우스 레이캐스팅) ---
        const raycaster = new THREE.Raycaster(); const pointer = new THREE.Vector2();
        function getRaycastResult(screenX, screenY) {
            pointer.x = (screenX / window.innerWidth) * 2 - 1; pointer.y = -(screenY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(pointer, camera);
            const targets = [groundMesh, ...Object.values(voxels)];
            const intersects = raycaster.intersectObjects(targets);
            if (intersects.length > 0) {
                const hit = intersects[0]; const distance = steveGroup.position.distanceTo(hit.point);
                if (distance > 10.0) return { allowed: false };
                const point = hit.point; const normal = hit.face.normal;
                let buildPos = new THREE.Vector3(); let breakPos = new THREE.Vector3();
                if (hit.object === groundMesh) { buildPos.set(Math.round(point.x), 0, Math.round(point.z)); breakPos.set(0, -999, 0); }
                else { const blockPos = hit.object.position; breakPos.copy(blockPos); buildPos.copy(blockPos).add(normal); }
                return { allowed: true, build: buildPos, break: breakPos, isGround: (hit.object === groundMesh) };
            }
            return null;
        }

        let pressStartX = 0; let pressStartY = 0; let didMovePointer = false; let activeInteractResult = null;
        function handlePointerDown(clientX, clientY, target) {
            if (target && target.closest('button')) return;
            if (target && target.closest('#palette-container')) return;
            if (!scene) return;
            didMovePointer = false; pressStartX = clientX; pressStartY = clientY;
            activeInteractResult = getRaycastResult(clientX, clientY);
            if (activeInteractResult && activeInteractResult.allowed) {
                if (activeMode === 'build') { ghostMesh.position.copy(activeInteractResult.build); ghostMesh.visible = true; }
                else if (!activeInteractResult.isGround) { ghostMesh.position.copy(activeInteractResult.break); ghostMesh.visible = true; }
            }
        }
        function handlePointerMove(clientX, clientY) {
            const deltaX = Math.abs(clientX - pressStartX); const deltaY = Math.abs(clientY - pressStartY);
            if (deltaX > 15 || deltaY > 15) { didMovePointer = true; if(ghostMesh) ghostMesh.visible = false; }
        }
        function handlePointerUp(clientX, clientY) {
            if(ghostMesh) ghostMesh.visible = false;
            if (!didMovePointer && activeInteractResult && activeInteractResult.allowed) {
                if (activeMode === 'build') {
                    const target = activeInteractResult.build;
                    const steveX = Math.round(steveGroup.position.x); const steveZ = Math.round(steveGroup.position.z); const steveY = Math.round(steveGroup.position.y);
                    const collidesWithSteve = (target.x === steveX && target.z === steveZ && (target.y === steveY || target.y === steveY - 1 || target.y === steveY + 1));
                    if (!collidesWithSteve || isAdminMode) {
                        addBlockToFirebase(target.x, target.y, target.z, selectedColorIndex);
                    }
                } else if (!activeInteractResult.isGround) {
                    const target = activeInteractResult.break;
                    removeBlockFromFirebase(target.x, target.y, target.z);
                }
            }
            activeInteractResult = null;
        }

        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) { touchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); baseCamDistance = camDistance; return; }
            handlePointerDown(e.changedTouches[0].clientX, e.changedTouches[0].clientY, e.target);
        }, { passive: true });
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && touchStartDist > 0) {
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                camDistance = Math.max(3.0, Math.min(25.0, baseCamDistance * (touchStartDist / dist))); return;
            }
            const touch = e.touches[0]; handlePointerMove(touch.clientX, touch.clientY);
            if (didMovePointer && !e.target.closest('button') && !e.target.closest('#palette-container')) {
                camTheta -= (touch.clientX - pressStartX) * 0.003; camPhi = Math.max(0.05, Math.min(Math.PI / 2.2, camPhi + (touch.clientY - pressStartY) * 0.003));
                pressStartX = touch.clientX; pressStartY = touch.clientY;
            }
        }, { passive: true });
        window.addEventListener('touchend', (e) => { if (e.touches.length < 2) touchStartDist = 0; if (e.touches.length === 0) handlePointerUp(e.changedTouches[0].clientX, e.changedTouches[0].clientY); });

        let isMouseDown = false;
        window.addEventListener('mousedown', (e) => { isMouseDown = true; handlePointerDown(e.clientX, e.clientY, e.target); });
        window.addEventListener('mousemove', (e) => {
            handlePointerMove(e.clientX, e.clientY);
            if (isMouseDown && didMovePointer && !e.target.closest('button') && !e.target.closest('#palette-container')) {
                camTheta -= e.movementX * 0.005; camPhi = Math.max(0.05, Math.min(Math.PI / 2.2, camPhi + e.movementY * 0.005));
            }
        });
        window.addEventListener('mouseup', (e) => { isMouseDown = false; handlePointerUp(e.clientX, e.clientY); });
        window.addEventListener('wheel', (e) => { camDistance = Math.max(3.0, Math.min(25.0, camDistance + e.deltaY * 0.005)); }, { passive: true });

        const keysPressed = {};
        window.addEventListener('keydown', (e) => { keysPressed[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keysPressed[e.key.toLowerCase()] = false; });

        document.getElementById('btn-fullscreen').onclick = (e) => { e.stopPropagation(); if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); };
        document.getElementById('btn-camera').onclick = (e) => {
            e.stopPropagation(); window.playSound('build'); renderer.render(scene, camera);
            const dataURL = renderer.domElement.toDataURL('image/png');
            const newTab = window.open();
            if (newTab) { newTab.document.write(`<html><body style="margin:0; background-color:#1e293b; display:flex; align-items:center; justify-content:center; height:100vh;"><img src="${dataURL}" style="max-width:95%; max-height:95%; border-radius:12px; box-shadow:0 25px 50px -12px rgb(0 0 0 / 0.5);"/></body></html>`); newTab.document.close(); }
        };

        const bindDpad = (id, dirKey) => {
            const btn = document.getElementById(id);
            const press = (e) => { e.stopPropagation(); inputState[dirKey] = true; };
            const release = (e) => { e.stopPropagation(); inputState[dirKey] = false; };
            btn.addEventListener('touchstart', press); btn.addEventListener('touchend', release);
            btn.addEventListener('mousedown', press); btn.addEventListener('mouseup', release); btn.addEventListener('mouseleave', release);
        };
        bindDpad('dpad-up', 'forward'); bindDpad('dpad-down', 'backward'); bindDpad('dpad-left', 'left'); bindDpad('dpad-right', 'right');

        const bindFly = (id, value) => {
            const btn = document.getElementById(id);
            const start = (e) => { e.stopPropagation(); player.isFlying = true; player.flyDirection = value; };
            const end = (e) => { e.stopPropagation(); player.flyDirection = 0; };
            btn.addEventListener('touchstart', start); btn.addEventListener('touchend', end);
            btn.addEventListener('mousedown', start); btn.addEventListener('mouseup', end); btn.addEventListener('mouseleave', end);
        };
        bindFly('btn-fly-up', 1); bindFly('btn-fly-down', -1);

        function getHighestVoxelAt(x, z) {
            let maxVal = -1; const rx = Math.round(x); const rz = Math.round(z);
            for (let k in voxels) { const parts = k.split(',').map(Number); if (parts[0] === rx && parts[2] === rz && parts[1] > maxVal) maxVal = parts[1]; }
            return maxVal;
        }

        // --- 렌더링 루프 ---
        const clock = new THREE.Clock();
        function tick() {
            requestAnimationFrame(tick);
            if (!scene) return;

            const dt = Math.min(clock.getDelta(), 0.1);

            let moveX = 0; let moveZ = 0;
            if (keysPressed['w'] || keysPressed['arrowup'] || inputState.forward) moveZ += 1.0; 
            if (keysPressed['s'] || keysPressed['arrowdown'] || inputState.backward) moveZ -= 1.0;
            if (keysPressed['a'] || keysPressed['arrowleft'] || inputState.left) moveX -= 1.0; 
            if (keysPressed['d'] || keysPressed['arrowright'] || inputState.right) moveX += 1.0;

            let inputVec = new THREE.Vector2(moveX, moveZ).normalize();
            const forwardDir = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), camTheta).normalize();
            const rightDir = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), camTheta).normalize();

            const moveDir = new THREE.Vector3().addScaledVector(forwardDir, inputVec.y).addScaledVector(rightDir, inputVec.x);
            player.isMoving = moveDir.lengthSq() > 0.01;

            if (player.isMoving) {
                player.pos.addScaledVector(moveDir, player.speed * dt);
                player.pos.x = Math.max(-55, Math.min(55, player.pos.x)); player.pos.z = Math.max(-55, Math.min(55, player.pos.z));
                let diff = Math.atan2(moveDir.x, moveDir.z) - player.rotY; player.rotY += Math.atan2(Math.sin(diff), Math.cos(diff)) * 12 * dt;
                player.animTime += dt * player.speed * 2.8; const swing = Math.sin(player.animTime);
                steveLeftArm.rotation.x = swing * 0.6; steveRightArm.rotation.x = -swing * 0.6; steveLeftLeg.rotation.x = -swing * 0.5; steveRightLeg.rotation.x = swing * 0.5;
            } else {
                steveLeftArm.rotation.x *= 0.85; steveRightArm.rotation.x *= 0.85; steveLeftLeg.rotation.x *= 0.85; steveRightLeg.rotation.x *= 0.85;
            }

            if (player.isFlying) {
                if (player.flyDirection !== 0) player.pos.y += player.flyDirection * 4.0 * dt;
                const currentBlockHeight = getHighestVoxelAt(player.pos.x, player.pos.z);
                const floorLimit = (currentBlockHeight >= 0) ? (currentBlockHeight + 1.125) : 0.125;
                if (player.pos.y < floorLimit) { player.pos.y = floorLimit; player.isFlying = false; }
            } else {
                const currentBlockHeight = getHighestVoxelAt(player.pos.x, player.pos.z);
                let targetY = (currentBlockHeight >= 0) ? currentBlockHeight + 1.125 : 0.125;
                player.pos.y += (targetY - player.pos.y) * 14 * dt;
            }
            player.pos.y = Math.min(30, player.pos.y);

            steveGroup.position.copy(player.pos);
            steveGroup.rotation.y = player.rotY;
            if (nameTagSprite && !isAdminMode) nameTagSprite.lookAt(camera.position);

            // 다른 유저 캐릭터 부드러운 위치 보간 처리
            for (let id in remotePlayers) {
                const rp = remotePlayers[id];
                rp.avatar.group.position.lerp(rp.targetPos, 0.15);
                
                let rDiff = rp.targetRot - rp.avatar.group.rotation.y;
                rDiff = Math.atan2(Math.sin(rDiff), Math.cos(rDiff));
                rp.avatar.group.rotation.y += rDiff * 0.15;
                
                const swing = Math.sin(rp.animTime || 0);
                rp.avatar.lArm.rotation.x = swing * 0.6; rp.avatar.rArm.rotation.x = -swing * 0.6;
                rp.avatar.lLeg.rotation.x = -swing * 0.5; rp.avatar.rLeg.rotation.x = swing * 0.5;

                if (rp.avatar.tag) rp.avatar.tag.lookAt(camera.position);
            }

            const lookTarget = new THREE.Vector3().copy(player.pos).add(new THREE.Vector3(0, 0.8, 0));
            camera.position.set(
                player.pos.x + camDistance * Math.sin(camTheta) * Math.cos(camPhi),
                player.pos.y + camDistance * Math.sin(camPhi),
                player.pos.z + camDistance * Math.cos(camTheta) * Math.cos(camPhi)
            );
            camera.lookAt(lookTarget);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if(!camera) return;
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 시작 핸들러
        window.addEventListener('DOMContentLoaded', () => {
            const loginOverlay = document.getElementById('login-overlay');
            const inputUsername = document.getElementById('input-username');
            const btnLoginSubmit = document.getElementById('btn-login-submit');
            inputUsername.focus();

            function submitLogin() {
                const name = inputUsername.value.trim();
                if (!name) { window.customAlert("이름을 한 글자 이상 입력해 주세요!"); return; }
                
                currentUserName = name;
                isAdminMode = (currentUserName === "조현지");
                
                loginOverlay.style.opacity = '0';
                setTimeout(() => {
                    loginOverlay.style.display = 'none';
                    initEngine();
                    tick();
                }, 300);
            }

            btnLoginSubmit.onclick = submitLogin;
            inputUsername.onkeydown = (e) => { if (e.key === "Enter") submitLogin(); };
        });
    </script>
</body>
</html>
